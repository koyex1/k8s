name: ci cart # ci code, ci terraform with atlantis, cd ec2 with ssh(to do docker run), cd ec2 with ssh(to do npm start)
                          # cd k8s with kubeconfig(to do k apply or helm install), cd k8s with argocd(none image changes), cd k8s(image via value.yaml or deploy.yaml) with argocd. 

permissions: #permission for reports to be uploaded to GitHub Security tab.
  contents: read # for checkout action
  security-events: write # for uploading sarif reports to security tab
  actions: read # for reusable workflow

on: # a pull request from feature branch(this is the branch that developers work on) to main branch. then on merge request to main branch, underneath a push event is triggered for main branch.
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci_cart.yaml'
      - 'services/cart/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci_cart.yaml'
      - 'services/cart/**'

env:
  GO_VERSION: 1.26

jobs:
  test-go:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cart

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go mod download

      - run: go test ./... -coverprofile=coverage.out

      - uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: services/cart/coverage.out

  sonar: 
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/cart
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - run: go mod download

      - name: Run SonarQube Analysis  
        uses: ./.github/actions/composite_sonar
        with:
          service-path: services/cart
          project-key: cart-service
          arguments: >
            -Dsonar.sources=.
            -Dsonar.tests=.
            -Dsonar.test.inclusions=**/*_test.go
            -Dsonar.go.coverage.reportPaths=coverage.out
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  dependency-scan:
    uses: ./.github/workflows/reuse_dependency_scan.yaml
    with:
      service-path: services/cart
      

  build-and-image-scan:
    needs: [dependency-scan, sonar, test-go] # added sonar and test-go as dependencies for build and image scan.
    uses: ./.github/workflows/reuse_build_scan.yaml
    with:
      service-path: services/cart
      image_name: cart-service
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
