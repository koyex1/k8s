name: ci products # ci code, ci terraform with atlantis, cd ec2 with ssh(to do docker run), cd ec2 with ssh(to do npm start)
                          # cd k8s with kubeconfig(to do k apply or helm install), cd k8s with argocd(none image changes), cd k8s(image via value.yaml or deploy.yaml) with argocd. 

permissions: #permission for reports to be uploaded to GitHub Security tab.
  contents: read # for checkout action
  security-events: write # for uploading sarif reports to security tab
  actions: read # for reusable workflow

on: # a pull request from feature branch(this is the branch that developers work on) to main branch. then on merge request to main branch, underneath a push event is triggered for main branch.
  push:
    branches: [main]
    paths:
      - '.github/workflows/ci_products.yaml'
      - 'services/products/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci_products.yaml'
      - 'services/products/**'

env:
  DOTNET_VERSION: 8.0

jobs:
  test-dotnet:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: services/products

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore

      - run: dotnet test --collect:"XPlat Code Coverage"

      - uses: actions/upload-artifact@v4
        with:
          name: dotnet-coverage
          path: services/products/TestResults/

  sonar: 
    if: false
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/products
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ env.DOTNET_VERSION }}

      - run: dotnet restore
    
      - uses: .github/actions/composite_sonar
        with:
          service-path: services/products
          project-key: products-service
          arguments: >
            -Dsonar.sources=.
            -Dsonar.tests=test
            -Dsonar.cs.opencover.reportsPaths=coverage.opencover.xml
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  dependency-scan:
    uses: ./.github/workflows/reuse_dependency_scan.yaml
    with:
      service-path: services/products
      

  build-and-image-scan:
    needs: [dependency-scan, sonar, test-dotnet] # added sonar and test-login as dependencies for build and image scan.
    uses: ./.github/workflows/reuse_build_scan.yaml
    with:
      service-path: services/products
      image_name: products-service
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
