name: Full CI/CD Pipeline # ci code, ci terraform with atlantis, cd ec2 with ssh(to do docker run), cd ec2 with ssh(to do npm start)
                          # cd k8s with kubeconfig(to do k apply or helm install), cd k8s with argocd(none image changes), cd k8s(image via value.yaml or deploy.yaml) with argocd. 

permissions: #permission for reports to be uploaded to GitHub Security tab.
  contents: read # for checkout action
  security-events: write # for uploading sarif reports to security tab
  actions: read # for reusable workflow

on: # a pull request from feature branch(this is the branch that developers work on) to main branch. then on merge request to main branch, underneath a push event is triggered for main branch.
  push:
    branches: [main]
    paths:
      - '.github/ci_register.yaml'
      - '.github/reusable-workflow/**'
      - 'services/register/**'
  pull_request:
    branches: [main]
    paths:
      - '.github/workflows/ci_register.yaml'
      - '.github/workflows/reusable-workflow/**'
      - 'services/register/**'

env:
  JAVA_VERSION: 21

jobs:
  test-java:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: services/register # correction 1 services/register from ${{ env.SERVICE_PATH }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}

      - run: mvn clean test

      - uses: actions/upload-artifact@v4
        with:
          name: java-test-report
          path: services/register/target/surefire-reports/

  sonar: 
    if: false
    uses: ./.github/workflows/reusable-workflow/reuse_sonar.yaml #correction 2 .github/workflows/reusable-workflow/reuse_sonar.yaml from .github/reusable-workflow/reuse_sonar.yaml
    with:
      service-path: services/register
      project-key: register-service
      arguments: >
        -Dsonar.tests=src/test
        -Dsonar.java.binaries=target/classes
        -Dsonar.coverage.jacoco.xmlReportPaths=target/site/jacoco/jacoco.xml
    secrets:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}

  dependency-scan:
    uses: ./.github/workflows/reusable-workflow/reuse_dependency_scan.yaml
    with:
      service-path: services/register
      

  build-and-image-scan:
    needs: [dependency-scan]
    uses: ./.github/workflows/reusable-workflow/reuse-build_scan.yaml 
    with:
      image_name: ${{vars.IMAGE_NAME}}
    secrets:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}
