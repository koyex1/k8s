apiVersion: karpenter.k8s.aws/v1beta1
kind: EC2NodeClass
metadata:
  name: default
spec:
  amiFamily: AL2

  role: <your-karpenter-node-role>

  subnetSelectorTerms:
    - tags:
        kubernetes.io/cluster/<cluster-name>: owned

  securityGroupSelectorTerms:
    - tags:
        kubernetes.io/cluster/<cluster-name>: owned