apiVersion: apps/v1
kind: Deployment
metadata:
  name: login-service
  namespace: ecommerce
spec:
  replicas: 1
  selector:
    matchLabels:
      app: login-service
  template:
    metadata:
      labels:
        app: login-service
    spec:
      containers:
        - name: login-service
          image: login-service:latest
          ports:
            - containerPort: 3000
          env:
            - name: REDIS_HOST
              value: redis
            - name: POSTGRES_HOST
              value: postgres