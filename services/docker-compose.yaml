services:
  frontend-service:
    container_name: frontend-service
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "8003:80"
    restart: unless-stopped

  login-service:
    container_name: login-service
    build: ./login
    ports:
      - "3000:3000"
    env_file:
      - ./.env
    depends_on:
      - redis
      - postgres
      - rabbitmq
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/login"]
      interval: 30s
      timeout: 5s
      retries: 3
  register-service:
    container_name: register-service
    build:
      context: ./register
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8080:8080"
    restart: always
    depends_on:
      - postgres
      - redis
      - rabbitmq
  products-service:
    container_name: products-service
    build:
      context: ./products
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8081:8080"
    restart: always
    depends_on:
      - postgres
      - redis
      - rabbitmq
  cart-service:
    container_name: cart-service
    build:
      context: ./cart
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8082:8080"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  order-service:
    container_name: order-service
    build:
      context: ./order
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "8000:8000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped
  
  notification-service:
    container_name: notification-service
    build:
      context: ./notification
      dockerfile: Dockerfile
    env_file:
      - ./.env
    ports:
      - "3001:3000"
    depends_on:
      - postgres
      - redis
      - rabbitmq
    restart: unless-stopped

  redis:
    image: redis:latest
    container_name: redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: postgres:latest
    container_name: postgres
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: pass
      POSTGRES_DB: appdb
    ports:
      - "5432:5432"
    volumes:
    - postgres_data:/var/lib/postgresql/data
    - ./db-init:/docker-entrypoint-initdb.d 
    restart: unless-stopped
  apisix:
    image: apache/apisix:latest
    container_name: apisix
    restart: always
    ulimits:
      nofile:
        soft: 65536
        hard: 65536
    depends_on:
      - etcd
    volumes:
      - ./apisix_conf/config.yaml:/usr/local/apisix/conf/config.yaml:ro
    ports:
      - "9080:9080" # HTTP Traffic
      - "9180:9180" # Admin API (Dashboard talks to this)
      - "9443:9443" # HTTPS Traffic
      - "9091:9091" # Metrics Export

  apisix-dashboard:
    image: apache/apisix-dashboard:latest
    container_name: apisix-dashboard
    restart: always
    ports:
      - "9000:9000"
    volumes:
      - ./apisix_conf/dashboard.yaml:/usr/local/apisix-dashboard/conf/conf.yaml:ro
    depends_on:
      - etcd
  etcd: #etcd here is used for apisix which is the api gateway.
    image: quay.io/coreos/etcd:v3.5.0
    container_name: etcd
    restart: always
    environment:
      - ETCD_DATA_DIR=/etcd_data
      - ALLOW_NONE_AUTHENTICATION=yes
      - ETCD_ADVERTISE_CLIENT_URLS=http://etcd:2379
      - ETCD_LISTEN_CLIENT_URLS=http://0.0.0.0:2379
    ports:
      - "2379:2379"
    volumes:
      - etcd_data:/etcd_data
  redis-ui:
    image: redis/redisinsight:latest
    container_name: redis-ui
    ports:
      - "5540:5540"
  rabbitmq:
    image: rabbitmq:3-management
    container_name: rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672" #port for management UI, you can access it at http://localhost:15672 with default username and password both being "guest". This UI allows you to monitor your queues, exchanges, bindings, and also publish messages for testing.
      - "15692:15692" #port for prometheus metrics, you can access it at http://localhost:15692/metrics to see the raw metrics output. You can also add this endpoint to your Prometheus config to scrape metrics from RabbitMQ.
    env_file:
      - ./.env
    command: >
      bash -c "
      rabbitmq-plugins enable rabbitmq_prometheus &&
      rabbitmq-server
      "
  zookeeper:
    image: confluentinc/cp-zookeeper:7.6.1
    container_name: zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ZOOKEEPER_4LW_COMMANDS_WHITELIST: "mntr,ruok,stat"
      KAFKA_OPTS: "-Dzookeeper.4lw.commands.whitelist=mntr,ruok,stat"
    ports:
      - "2181:2181"
  kafka1:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka1
    depends_on:
      - zookeeper
    ports:
      - "9092:9092" #port for external clients like your backend and kafka-ui to connect
      - "29092:29092" #port for internal communication between kafka and other services
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      # internal docker network listener:
      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29092,EXTERNAL://0.0.0.0:9092"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka1:29092,EXTERNAL://localhost:9092"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
  
  kafka2:
    image: confluentinc/cp-kafka:7.6.1
    container_name: kafka2
    depends_on:
      - zookeeper
    ports:
      - "9093:9093"
    environment:
      KAFKA_BROKER_ID: 2

      KAFKA_ZOOKEEPER_CONNECT: "zookeeper:2181"

      KAFKA_LISTENERS: "INTERNAL://0.0.0.0:29093,EXTERNAL://0.0.0.0:9093"
      KAFKA_ADVERTISED_LISTENERS: "INTERNAL://kafka2:29093,EXTERNAL://localhost:9093"
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: "INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT"
      KAFKA_INTER_BROKER_LISTENER_NAME: "INTERNAL"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 2
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: kafka-ui
    depends_on:
      - kafka1
      - kafka2
    ports:
      - "8083:8080"
    environment:
      KAFKA_CLUSTERS_0_NAME: local
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka1:29092,kafka2:29093
      KAFKA_CLUSTERS_0_ZOOKEEPER: zookeeper:2181

  sonarqube-db:
    image: postgres:15
    container_name: sonarqube-db
    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonarpass
      POSTGRES_DB: sonarqube
    volumes:
      - sonarqube_db_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- SonarQube ---
  sonarqube:
    image: sonarqube:9.9-community
    container_name: sonarqube
    depends_on:
      - sonarqube-db
    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonarqube-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonarpass
    ports:
      - "9400:9000"
    ulimits:
      nofile:
        soft: 65536
        hard: 262144
    volumes:
      - sonarqube_data:/opt/sonarqube/data
      - sonarqube_logs:/opt/sonarqube/logs
      - sonarqube_extensions:/opt/sonarqube/extensions
    restart: unless-stopped

volumes:
  postgres_data:
  etcd_data:
  sonarqube_db_data:
  sonarqube_data:
  sonarqube_logs:
  sonarqube_extensions: