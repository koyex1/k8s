server.port=8080

# =========================
# DATABASE (derived from env)
# =========================
spring.datasource.url=jdbc:postgresql://${DB_HOST}:${DB_PORT}/${DB_NAME}
spring.datasource.username=${DB_USER}
spring.datasource.password=${DB_PASSWORD}

# =========================
# REDIS
# =========================
# Your env is REDIS_URL, so we extract host/port
spring.redis.host=${REDIS_HOST:redis}
spring.redis.port=${REDIS_PORT:6379}

# OR (better approach if you switch config class)
# spring.redis.url=${REDIS_URL}

# =========================
# OTEL (TRACING)
# =========================
otel.exporter.otlp.endpoint=${OTEL_EXPORTER_OTLP_ENDPOINT}

# =========================
# INTERNAL SERVICE URLS
# =========================
app.base-url.login=${BASE_URL_LOGIN}
app.base-url.register=${BASE_URL_REGISTER}
app.base-url.cart=${BASE_URL_CART}
app.base-url.order=${BASE_URL_ORDER}

# =========================
# APISIX CONFIG
# =========================
app.apisix.admin-url=${APISIX_ADMIN_URL}
app.apisix.admin-key=${APISIX_ADMIN_KEY}
app.apisix.consumer-name=${APISIX_CONSUMER_NAME}
app.apisix.consumer-key=${APISIX_CONSUMER_KEY}